name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: snipvault-windows-x64.exe
          - os: macos-latest
            artifact: snipvault-macos-arm64
          - os: ubuntu-latest
            artifact: snipvault-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run test suite
        run: python -m unittest discover -s tests

      - name: Build single-file executable
        run: |
          pip install pyinstaller
          pyinstaller --onefile --console --paths . --name "${{ matrix.artifact }}" packaging/entry.py

      - name: Smoke-test the binary
        run: ./dist/${{ matrix.artifact }} --help
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
